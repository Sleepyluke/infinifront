name: CI
on: [push, pull_request]
jobs:
  test:
    # ubuntu is deliberate: the golden determinism hash was generated on Windows,
    # so this cross-OS run is what detects platform divergence. Do not "simplify"
    # to windows-latest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release
